version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: depdash_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/depdash_test
      NEXTAUTH_SECRET: test-secret-key-for-github-actions-testing-only
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: sh -c "npx prisma db push && npx tsx prisma/seed.ts && npm start"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
