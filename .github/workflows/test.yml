name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    name: Unit & Parser Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run parser tests
        run: npm test -- --run tests/parsers

  integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run integration tests (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 10
          on_retry_command: docker compose -f docker-compose.test.yml down -v
          command: |
            docker compose -f docker-compose.test.yml up -d --build
            timeout 120 bash -c 'until docker compose -f docker-compose.test.yml ps app | grep "healthy"; do sleep 2; done'
            npx prisma db push
            npm test -- --run tests/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/depdash_test

      - name: Show app container logs
        if: always()
        run: docker compose -f docker-compose.test.yml logs app

      - name: Stop and remove containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit
